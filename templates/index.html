<!DOCTYPE html>
<html>

<head>
    <title>Linux Security Dashboard</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#0f172a;
            color:white;
            margin:0;
            padding:30px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        .container{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:20px;
        }

        .card{

            background:#1e293b;
            padding:20px;
            border-radius:15px;
            box-shadow:0px 4px 15px rgba(0,0,0,0.4);

        }

        .high{
            border-left:6px solid red;
        }

        .medium{
            border-left:6px solid orange;
        }

        .low{
            border-left:6px solid green;
        }

        h2{
            margin-top:0;
        }

        .ip{
            font-size:22px;
            font-weight:bold;
        }

        .severity{
            margin-top:10px;
        }

        img{

            margin-top:30px;
            width:100%;
            border-radius:15px;

        }

    </style>

</head>

<body>

<h1>🛡 Linux Security Intelligence Dashboard</h1>

<div class="container">

{% for item in data %}

<div class="card {{item.severity.lower()}}">

<h2>Threat Details</h2>

<div class="ip">
{{item.ip}}
</div>

<p>
Attempts:
{{item.attempts}}
</p>

<p class="severity">

Severity:
<b>
{{item.severity}}
</b>

</p>

<p>

Attack Type:
{{item.attack_type}}

</p>

</div>

{% endfor %}

</div>

<img src="/static/attack_graph.png">

</body>

</html>
